<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugendsprache Wörterbuch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
        }

        .search-container {
            position: sticky;
            top: 0;
            background-color: rgba(252, 252, 252, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .word-card {
            border-bottom: 1px solid #eee;
            transition: background-color 0.2s ease;
        }

        .word-card:last-child {
            border-bottom: none;
        }

        .word-card:hover {
            background-color: #f8f8f8;
        }

        input:focus {
            outline: none;
            border-color: #000;
        }

        .badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            background: #f0f0f0;
            color: #666;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-3xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="mb-12">
            <h1 class="text-3xl font-semibold tracking-tight mb-2">Glossar</h1>
            <p class="text-gray-500">Lexikon der aktuellen Jugendsprache.</p>
        </header>

        <!-- Search & Filter Area -->
        <div class="search-container py-4 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Begriff suchen..." 
                        class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm transition-all shadow-sm"
                    >
                </div>
                <div class="flex gap-2">
                    <button 
                        id="sortAsc" 
                        class="px-4 py-3 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors shadow-sm"
                    >
                        A-Z
                    </button>
                    <button 
                        id="sortDesc" 
                        class="px-4 py-3 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors shadow-sm"
                    >
                        Z-A
                    </button>
                </div>
            </div>
            <div id="resultCount" class="mt-4 text-xs text-gray-400 font-medium uppercase tracking-widest">
                Lade Daten...
            </div>
        </div>

        <!-- Dictionary List -->
        <div id="dictionaryList" class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
            <!-- Items werden hier injiziert -->
            <div class="p-12 text-center text-gray-400 italic">
                Wörterbuch wird geladen...
            </div>
        </div>
    </div>

    <script>
        /**
         * Erwartetes JSON Format in jugendsprache.json:
         * [
         * { "wort": "Cringe", "definition": "Fremdschämen oder peinlich.", "beispiel": "Das war echt cringe von ihm." },
         * ...
         * ]
         */

        let dictionaryData = [];
        const dictionaryList = document.getElementById('dictionaryList');
        const searchInput = document.getElementById('searchInput');
        const resultCount = document.getElementById('resultCount');
        const sortAscBtn = document.getElementById('sortAsc');
        const sortDescBtn = document.getElementById('sortDesc');

        async function loadData() {
            try {
                let data;
                try {
                    const response = await fetch('jugendsprache.json');
                    if (!response.ok) throw new Error('Datei nicht gefunden');
                    data = await response.json();
                } catch (e) {
                    console.warn("jugendsprache.json nicht gefunden, nutze Beispiel-Daten.");
                    data = [
                        { wort: "Keine Wörter gefunden", definition: "Datenbank überprüfen." },
                    ];
                }

                dictionaryData = data;
                renderDictionary(dictionaryData);
            } catch (error) {
                dictionaryList.innerHTML = `<div class="p-8 text-red-500">Fehler beim Laden der Datenbank: ${error.message}</div>`;
            }
        }

        function renderDictionary(data) {
            if (data.length === 0) {
                dictionaryList.innerHTML = '<div class="p-12 text-center text-gray-400">Keine Einträge gefunden.</div>';
                resultCount.innerText = "0 Begriffe gefunden";
                return;
            }

            dictionaryList.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card p-6';
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-2">
                        <h2 class="text-xl font-bold">${item.wort}</h2>
                        <span class="badge">Begriff</span>
                    </div>
                    <p class="text-gray-700 leading-relaxed mb-3">${item.definition}</p>
                    ${item.beispiel ? `<p class="text-sm text-gray-400 italic">"${item.beispiel}"</p>` : ''}
                `;
                dictionaryList.appendChild(card);
            });

            resultCount.innerText = `${data.length} Begriffe gefunden`;
        }

        // Suchfunktion
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = dictionaryData.filter(item => 
                item.wort.toLowerCase().includes(term) || 
                item.definition.toLowerCase().includes(term)
            );
            renderDictionary(filtered);
        });

        // Sortierung
        sortAscBtn.addEventListener('click', () => {
            const sorted = [...dictionaryData].sort((a, b) => a.wort.localeCompare(b.wort));
            dictionaryData = sorted; // Update global state
            renderDictionary(dictionaryData);
        });

        sortDescBtn.addEventListener('click', () => {
            const sorted = [...dictionaryData].sort((a, b) => b.wort.localeCompare(a.wort));
            dictionaryData = sorted; // Update global state
            renderDictionary(dictionaryData);
        });

        // Initialer Start
        window.onload = loadData;
    </script>
</body>
</html>
