<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugendsprache Wörterbuch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .search-container {
            position: sticky;
            top: 0;
            background-color: rgba(252, 252, 252, 0.9);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .word-card {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .word-card:last-child {
            border-bottom: none;
        }

        .word-card:hover {
            background-color: #f9f9f9;
            padding-left: 2.25rem;
        }

        input:focus {
            outline: none;
            border-color: #d1d1d1;
        }

        .slide-view {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 50;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .slide-view.active {
            right: 0;
        }

        .groq-content {
            line-height: 1.8;
            color: #374151;
        }

        .groq-content h3 {
            font-weight: 600;
            color: #111;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .toggle-dot {
            transition: all 0.3s ease-in-out;
        }
        input:checked ~ .toggle-dot {
            transform: translateX(100%);
            background-color: #10b981;
        }
        input:checked ~ .toggle-bg {
            background-color: #ecfdf5;
            border-color: #10b981;
        }

        .update-chip {
            background: #f3f4f6;
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .update-chip:hover {
            background: #000;
            color: #fff;
            border-color: #000;
            transform: translateY(-1px);
        }

        /* Group badge on cards */
        .gruppe-badge {
            display: inline-flex;
            align-items: center;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            user-select: none;
        }

        .gruppe-badge:hover {
            transform: translateY(-1px);
            filter: brightness(0.92);
        }

        /* Group filter pills */
        .group-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1.5px solid #e5e7eb;
            background: white;
            color: #555;
            white-space: nowrap;
        }

        .group-pill:hover {
            border-color: #bbb;
            color: #111;
        }

        .group-pill.active {
            color: white;
            border-color: transparent;
        }

        .group-pill .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .groups-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        .groups-scroll::-webkit-scrollbar { display: none; }

        /* Group color map — defined via CSS classes */
        .g-Ausruf        { background: #fef3c7; color: #92400e; border-color: #fde68a; }
        .g-Ausruf-pill   { background: #d97706; }
        .g-Anrede        { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .g-Anrede-pill   { background: #2563eb; }
        .g-Adjektiv      { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .g-Adjektiv-pill { background: #16a34a; }
        .g-Verb          { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
        .g-Verb-pill     { background: #7c3aed; }
        .g-Substantiv    { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .g-Substantiv-pill { background: #dc2626; }
        .g-Abkürzung     { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
        .g-Abkürzung-pill { background: #64748b; }
        .g-Satz          { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
        .g-Satz-pill     { background: #ea580c; }
        .g-Beleidigung   { background: #fdf2f8; color: #9d174d; border-color: #fbcfe8; }
        .g-Beleidigung-pill { background: #be185d; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="mainView" class="max-w-3xl mx-auto px-6 py-16">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight mb-3 text-black">Wörterbuch</h1>
                <p class="text-gray-500 text-lg">Aktuelle Begriffe der Jugendsprache.</p>
            </div>
            <button onclick="openUpdateLog()" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black transition-colors flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                Was ist neu?
            </button>
        </header>

        <div class="search-container py-6 mb-10">
            <div class="flex flex-col sm:flex-row gap-3 items-center">
                <div class="relative flex-grow w-full">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Begriff suchen..." 
                        class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-sm shadow-sm focus:shadow-md transition-all"
                    >
                </div>
                <div class="flex gap-2 items-center shrink-0">
                    <label for="filterToggle" class="flex items-center cursor-pointer bg-white border border-gray-200 rounded-lg px-3 py-2.5 shadow-sm hover:bg-gray-50 transition-colors">
                        <span class="mr-3 text-xs font-bold uppercase tracking-wider text-gray-400">Anstößig filtern</span>
                        <div class="relative">
                            <input type="checkbox" id="filterToggle" class="sr-only">
                            <div class="toggle-bg block w-10 h-6 rounded-full border border-gray-200 bg-gray-50 transition-colors"></div>
                            <div class="toggle-dot absolute left-1 top-1 bg-gray-300 w-4 h-4 rounded-full transition-transform"></div>
                        </div>
                    </label>
                    <button id="sortAsc" class="px-4 py-3 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 shadow-sm">A-Z</button>
                    <button id="sortDesc" class="px-4 py-3 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 shadow-sm">Z-A</button>
                </div>
            </div>

            <!-- Group filter pills -->
            <div class="groups-scroll mt-4" id="groupPills"></div>

            <div id="resultCount" class="mt-3 text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em]">Lade...</div>
        </div>

        <div id="dictionaryList" class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
            <div class="p-20 text-center text-gray-400 animate-pulse">Lade Datenbank...</div>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detailView" class="slide-view">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <button onclick="closeSlideView()" class="mb-12 flex items-center text-sm font-medium text-gray-400 hover:text-black transition-colors group">
                <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Zurück
            </button>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Group View -->
    <div id="groupView" class="slide-view">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <button onclick="closeSlideView()" class="mb-12 flex items-center text-sm font-medium text-gray-400 hover:text-black transition-colors group">
                <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Zurück
            </button>
            <div id="groupViewContent"></div>
        </div>
    </div>

    <!-- Update Log Overlay -->
    <div id="updateLogView" class="slide-view">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <button onclick="closeSlideView()" class="mb-12 flex items-center text-sm font-medium text-gray-400 hover:text-black transition-colors group">
                <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Schließen
            </button>
            <h2 class="text-4xl font-bold mb-2 tracking-tight text-black">Update-Log</h2>
            <p class="text-gray-500 mb-16">Übersicht der zuletzt hinzugefügten Begriffe.</p>
            <div id="commitList" class="space-y-16">
                <div class="animate-pulse space-y-6">
                    <div class="h-3 bg-gray-100 rounded w-1/4"></div>
                    <div class="flex gap-2">
                        <div class="h-10 bg-gray-50 rounded w-24"></div>
                        <div class="h-10 bg-gray-50 rounded w-20"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEYS_URL = "https://groq-api-keys.pages.dev/apikeys.txt";
        const OFFENSIVE_WORDS_URL = "https://redretep.github.io/jugendsprache-lexikon/anstoessige-begriffe.txt";
        const GITHUB_REPO = "redretep/jugendsprache-lexikon";
        const DATA_FILE = "jugendsprache.json";

        // Group display config
        const GROUP_CONFIG = {
            "Ausruf":      { label: "Ausruf",      badgeClass: "g-Ausruf",      pillClass: "g-Ausruf-pill" },
            "Anrede":      { label: "Anrede",      badgeClass: "g-Anrede",      pillClass: "g-Anrede-pill" },
            "Adjektiv":    { label: "Adjektiv",    badgeClass: "g-Adjektiv",    pillClass: "g-Adjektiv-pill" },
            "Verb":        { label: "Verb",        badgeClass: "g-Verb",        pillClass: "g-Verb-pill" },
            "Substantiv":  { label: "Substantiv",  badgeClass: "g-Substantiv",  pillClass: "g-Substantiv-pill" },
            "Abkürzung":   { label: "Abkürzung",   badgeClass: "g-Abkürzung",   pillClass: "g-Abkürzung-pill" },
            "Satz/Phrase": { label: "Phrase",      badgeClass: "g-Satz",        pillClass: "g-Satz-pill" },
            "Beleidigung": { label: "Beleidigung", badgeClass: "g-Beleidigung", pillClass: "g-Beleidigung-pill" },
        };

        let apiKeys = [];
        let apiKeyIndex = -1;
        let dictionaryData = [];
        let filteredData = [];
        let offensiveWords = [];
        let activeGroup = null;

        const dictionaryList = document.getElementById('dictionaryList');
        const searchInput = document.getElementById('searchInput');
        const filterToggle = document.getElementById('filterToggle');
        const resultCount = document.getElementById('resultCount');
        const sortAscBtn = document.getElementById('sortAsc');
        const sortDescBtn = document.getElementById('sortDesc');
        const detailView = document.getElementById('detailView');
        const groupView = document.getElementById('groupView');
        const updateLogView = document.getElementById('updateLogView');
        const detailContent = document.getElementById('detailContent');
        const commitList = document.getElementById('commitList');
        const groupPillsContainer = document.getElementById('groupPills');
        const groupViewContent = document.getElementById('groupViewContent');

        // ---- Group Helpers ----
        function getGroupCfg(gruppe) {
            if (!gruppe) return null;
            // normalize "Satz/Phrase" variants
            const key = Object.keys(GROUP_CONFIG).find(k => gruppe.startsWith(k.split('/')[0])) || gruppe;
            return GROUP_CONFIG[key] || null;
        }

        function groupBadgeHTML(gruppe, clickable = true) {
            const cfg = getGroupCfg(gruppe);
            if (!cfg) return '';
            const label = cfg.label;
            const cls = cfg.badgeClass;
            if (clickable) {
                return `<span class="gruppe-badge ${cls}" onclick="event.stopPropagation(); openGroupView('${gruppe}')" title="Alle ${label}-Begriffe anzeigen">${label}</span>`;
            }
            return `<span class="gruppe-badge ${cls}">${label}</span>`;
        }

        function buildGroupPills() {
            // "Alle" pill
            groupPillsContainer.innerHTML = '';
            const allPill = document.createElement('button');
            allPill.className = 'group-pill' + (activeGroup === null ? ' active' : '');
            allPill.style.cssText = activeGroup === null ? 'background:#111;border-color:#111;color:white;' : '';
            allPill.innerHTML = 'Alle';
            allPill.onclick = () => { activeGroup = null; buildGroupPills(); applyFilters(); };
            groupPillsContainer.appendChild(allPill);

            Object.entries(GROUP_CONFIG).forEach(([key, cfg]) => {
                const count = dictionaryData.filter(d => d.gruppe && d.gruppe.startsWith(key.split('/')[0])).length;
                if (!count) return;
                const pill = document.createElement('button');
                const isActive = activeGroup === key;
                pill.className = 'group-pill' + (isActive ? ' active ' + cfg.pillClass : '');
                if (isActive) pill.style.cssText = '';
                pill.innerHTML = `<span class="dot" style="background:${isActive ? 'rgba(255,255,255,0.7)' : cfg.pillClass.includes('pill') ? '' : '#999'}"></span>${cfg.label} <span style="opacity:0.6;font-weight:400">${count}</span>`;

                // set dot color dynamically
                const dot = pill.querySelector('.dot');
                if (!isActive) {
                    const colorMap = {
                        "g-Ausruf-pill":"#d97706","g-Anrede-pill":"#2563eb","g-Adjektiv-pill":"#16a34a",
                        "g-Verb-pill":"#7c3aed","g-Substantiv-pill":"#dc2626","g-Abkürzung-pill":"#64748b",
                        "g-Satz-pill":"#ea580c","g-Beleidigung-pill":"#be185d"
                    };
                    dot.style.background = colorMap[cfg.pillClass] || '#999';
                }

                pill.onclick = () => { activeGroup = key; buildGroupPills(); applyFilters(); };
                groupPillsContainer.appendChild(pill);
            });
        }

        // ---- Group View (slide panel) ----
        function openGroupView(gruppe) {
            const normalized = Object.keys(GROUP_CONFIG).find(k => gruppe.startsWith(k.split('/')[0])) || gruppe;
            const cfg = getGroupCfg(gruppe);
            const label = cfg ? cfg.label : gruppe;
            const words = dictionaryData.filter(d => d.gruppe && d.gruppe.startsWith(normalized.split('/')[0]));
            words.sort((a, b) => a.begriff.localeCompare(b.begriff));

            groupViewContent.innerHTML = `
                <div class="flex items-center gap-3 mb-3">
                    ${groupBadgeHTML(gruppe, false)}
                    <h2 class="text-4xl font-bold tracking-tight text-black">${label}</h2>
                </div>
                <p class="text-gray-400 text-sm mb-12">${words.length} Begriffe in dieser Gruppe</p>
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                    ${words.map(item => `
                        <div class="word-card p-6 group" onclick="closeGroupAndOpenWord('${encodeURIComponent(item.begriff)}')">
                            <div class="flex items-center justify-between mb-1">
                                <h2 class="text-lg font-semibold tracking-tight">${item.begriff}</h2>
                                <svg class="w-4 h-4 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                            <p class="text-gray-500 truncate text-sm">${item.bedeutung}</p>
                        </div>
                    `).join('')}
                </div>
            `;

            groupView.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGroupAndOpenWord(encodedBegriff) {
            groupView.classList.remove('active');
            setTimeout(() => openWordDetail(decodeURIComponent(encodedBegriff)), 50);
        }

        // ---- Init ----
        async function initApiKeys() {
            try {
                const res = await fetch(API_KEYS_URL);
                const txt = await res.text();
                apiKeys = txt.split(/\r?\n/).map(l => l.trim()).filter(l => l);
            } catch(e) { console.error("Key fetch failed", e); }
        }

        async function initOffensiveWords() {
            try {
                const res = await fetch(OFFENSIVE_WORDS_URL);
                const txt = await res.text();
                offensiveWords = txt.split(/,|\n/).map(w => w.trim().toLowerCase()).filter(w => w.length > 0);
            } catch(e) { console.error("Offensive words fetch failed", e); }
        }

        async function fetchUpdateLog() {
            try {
                const commitsRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits?path=${DATA_FILE}`);
                const commits = await commitsRes.json();
                commitList.innerHTML = '';
                for (let i = 0; i < Math.min(commits.length - 1, 2); i++) {
                    const currentCommit = commits[i];
                    const prevCommit = commits[i+1];
                    const date = new Date(currentCommit.commit.author.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
                    const [currFile, prevFile] = await Promise.all([
                        fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${currentCommit.sha}/${DATA_FILE}`).then(r => r.json()),
                        fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${prevCommit.sha}/${DATA_FILE}`).then(r => r.json())
                    ]);
                    const currWords = currFile.jugendsprache_aktuell.map(j => j.begriff);
                    const prevWords = prevFile.jugendsprache_aktuell.map(j => j.begriff);
                    const newWords = currWords.filter(w => !prevWords.includes(w));
                    if (newWords.length > 0) {
                        const div = document.createElement('div');
                        div.className = 'relative pl-10 border-l border-gray-200';
                        div.innerHTML = `
                            <div class="absolute -left-[5px] top-0 w-2.5 h-2.5 bg-black rounded-full border-2 border-white"></div>
                            <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-6">${date}</div>
                            <div class="flex flex-wrap gap-3">
                                ${newWords.map(w => `<a href="#${encodeURIComponent(w)}" class="update-chip" onclick="closeSlideView(); event.stopPropagation();">${w}</a>`).join('')}
                            </div>
                        `;
                        commitList.appendChild(div);
                    }
                }
                if (commitList.innerHTML === '') {
                    commitList.innerHTML = '<p class="text-gray-400 italic">Keine neuen Wort-Ergänzungen in den letzten Commits gefunden.</p>';
                }
            } catch(e) {
                commitList.innerHTML = '<p class="text-red-400 text-sm">Fehler beim Laden des GitHub-Logs.</p>';
            }
        }

        function openUpdateLog() {
            updateLogView.classList.add('active');
            document.body.style.overflow = 'hidden';
            fetchUpdateLog();
        }

        function closeSlideView() {
            detailView.classList.remove('active');
            updateLogView.classList.remove('active');
            groupView.classList.remove('active');
            document.body.style.overflow = '';
            if (window.location.hash) history.pushState(null, '', window.location.pathname);
        }

        function getNextApiKey() {
            if (!apiKeys.length) return "";
            apiKeyIndex = (apiKeyIndex + 1) % apiKeys.length;
            return apiKeys[apiKeyIndex];
        }

        async function fetchGroqExplanation(word, shortDef) {
            const key = getNextApiKey();
            if (!key) return null;
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Antworte präzise auf Deutsch ohne Floskeln. Nutze ### Bedeutung, ### Herkunft, ### Beispiele." },
                            { role: "user", content: `Erkläre den Jugendbegriff "${word}". Basis: ${shortDef}` }
                        ],
                        temperature: 0.5
                    })
                });
                if (response.ok) {
                    const data = await response.json();
                    return data.choices?.[0]?.message?.content;
                }
            } catch (e) { console.error(e); }
            return null;
        }

        async function loadData() {
            initApiKeys();
            initOffensiveWords();
            try {
                const response = await fetch(`https://redretep.github.io/jugendsprache-lexikon/${DATA_FILE}`);
                if (!response.ok) throw new Error('Daten konnten nicht geladen werden.');
                const json = await response.json();
                dictionaryData = json.jugendsprache_aktuell || [];
                dictionaryData.sort((a, b) => a.begriff.localeCompare(b.begriff));
                buildGroupPills();
                applyFilters();
                handleHashChange();
            } catch (error) {
                dictionaryList.innerHTML = `<div class="p-12 text-center text-red-500">${error.message}</div>`;
            }
        }

        function applyFilters() {
            const term = searchInput.value.toLowerCase().trim();
            const isFilterActive = filterToggle.checked;
            filteredData = dictionaryData.filter(item => {
                const matches = item.begriff.toLowerCase().includes(term) || item.bedeutung.toLowerCase().includes(term);
                if (!matches) return false;
                if (isFilterActive && offensiveWords.includes(item.begriff.toLowerCase())) return false;
                if (activeGroup !== null) {
                    const normalizedKey = activeGroup.split('/')[0];
                    if (!item.gruppe || !item.gruppe.startsWith(normalizedKey)) return false;
                }
                return true;
            });
            renderDictionary(filteredData);
        }

        function renderDictionary(data) {
            if (data.length === 0) {
                dictionaryList.innerHTML = '<div class="p-20 text-center text-gray-400">Keine Ergebnisse.</div>';
                resultCount.innerText = "0 Begriffe";
                return;
            }
            dictionaryList.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card p-8 group';
                card.onclick = () => openWordDetail(item.begriff);
                const badge = item.gruppe ? groupBadgeHTML(item.gruppe) : '';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h2 class="text-xl font-semibold tracking-tight">${item.begriff}</h2>
                            ${badge}
                        </div>
                        <svg class="w-5 h-5 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                    <p class="text-gray-500 truncate text-sm font-medium">${item.bedeutung}</p>
                `;
                dictionaryList.appendChild(card);
            });
            resultCount.innerText = `${data.length} Begriffe verfügbar`;
        }

        function formatMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-black font-semibold">$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^- (.*)/gm, '<li>$1</li>');
        }

        async function openWordDetail(begriff) {
            window.location.hash = begriff;
            const item = dictionaryData.find(i => i.begriff === begriff);
            if (!item) return;

            const badge = item.gruppe ? `
                <div class="mb-6">
                    ${groupBadgeHTML(item.gruppe)}
                </div>` : '';

            detailContent.innerHTML = `
                <h1 class="text-6xl font-bold mb-4 tracking-tighter text-black">${item.begriff}</h1>
                ${badge}
                <p class="text-2xl text-gray-600 mb-16 leading-relaxed font-light">${item.bedeutung}</p>
                <div id="groqSection" class="border-t border-gray-100 pt-16">
                    <div class="animate-pulse space-y-4">
                        <div class="h-4 bg-gray-100 rounded w-1/4"></div>
                        <div class="h-3 bg-gray-50 rounded w-full"></div>
                        <div class="h-3 bg-gray-50 rounded w-5/6"></div>
                    </div>
                </div>
            `;
            detailView.classList.add('active');
            document.body.style.overflow = 'hidden';

            const explanation = await fetchGroqExplanation(item.begriff, item.bedeutung);
            const groqSection = document.getElementById('groqSection');
            if (explanation) {
                groqSection.innerHTML = `
                    <div class="flex items-center mb-10"><div class="w-1 h-6 bg-black mr-4"></div>
                    <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">AI Analyse</h3></div>
                    <div class="groq-content text-lg">${formatMarkdown(explanation)}</div>
                `;
            } else {
                groqSection.innerHTML = `<p class="text-gray-400 italic text-sm">Zusatzinfos nicht verfügbar.</p>`;
            }
        }

        function handleHashChange() {
            const hash = decodeURIComponent(window.location.hash.substring(1));
            if (hash) openWordDetail(hash);
            else closeSlideView();
        }

        window.onhashchange = handleHashChange;
        searchInput.addEventListener('input', applyFilters);
        filterToggle.addEventListener('change', applyFilters);
        sortAscBtn.onclick = () => { filteredData.sort((a, b) => a.begriff.localeCompare(b.begriff)); renderDictionary(filteredData); };
        sortDescBtn.onclick = () => { filteredData.sort((a, b) => b.begriff.localeCompare(a.begriff)); renderDictionary(filteredData); };

        loadData();
    </script>
</body>
</html>
